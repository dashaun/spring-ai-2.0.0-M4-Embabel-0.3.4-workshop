# =============================================================================
# Lab 3 — MCP Filesystem Server
# =============================================================================
spring:
  application:
    name: lab-3-mcp-filesystem-server

  ai:
    mcp:
      server:
        name: filesystem-server
        version: 1.0.0
        protocol: STREAMABLE

# Workspace that this server operates in (sandboxed)
workshop:
  workspace:
    path: ./workspace

server:
  port: 8083
  tomcat:
    # Flush SSE events immediately — without this, Tomcat's NIO connector buffers
    # the initial SSE event and the MCP client never receives it.
    use-relative-redirects: false
  servlet:
    async:
      timeout: 60000
