# =============================================================================
# Lab 4 — Developer Sidekick: The Full Stack
# =============================================================================
spring:
  application:
    name: lab-4-developer-sidekick

  # Jackson 3 (Spring Boot 4) is strict about control chars in JSON strings.
  # Allow unescaped newlines so multiline curl payloads work out of the box.
  jackson:
    parser-features:
      ALLOW_UNQUOTED_CONTROL_CHARS: true

  data:
    redis:
      host: localhost
      port: 6379
      username: default
      password:

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen2.5-coder:1.5b
        options:
          temperature: 0.3
          num-predict: 4096
      embedding:
        model: nomic-embed-text

    vectorstore:
      redis:
        index-name: sidekick-knowledge
        initialize-schema: true

    # -------------------------------------------------------------------------
    # MCP Client Configuration
    # -------------------------------------------------------------------------
    # These are the MCP tool servers the agent can call.
    # JavaClaw-style: each server exposes tools via the MCP protocol.
    # -------------------------------------------------------------------------
    mcp:
      client:
        stdio:
          connections:
            # A filesystem MCP server — lets the agent read/write project files
            filesystem:
              command: npx
              args:
                - "-y"
                - "@modelcontextprotocol/server-filesystem"
                - "./workspace"    # Sandboxed to the workspace directory

# Embabel configuration
embabel:
  models:
    default-llm: qwen2.5-coder:1.5b
  planning:
    max-depth: 15
    timeout-seconds: 60

# Workspace for the agent to operate in (sandboxed)
workshop:
  workspace:
    path: ./workspace
  docs:
    path: classpath:docs/

server:
  port: 8084
