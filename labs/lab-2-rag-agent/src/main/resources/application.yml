# =============================================================================
# Lab 2 — Context-Aware Documentation Agent (RAG)
# =============================================================================
spring:
  application:
    name: lab-2-rag-agent

  data:
    redis:
      host: localhost
      port: 6379
      username: default
      password:

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2
        options:
          temperature: 0.3          # Lower temperature for factual Q&A
          num-predict: 1024
      embedding:
        model: nomic-embed-text     # Local embedding model

    vectorstore:
      redis:
        index-name: workshop-docs        # Redis Search index name
        initialize-schema: true          # Auto-create index on startup

# Path to the documents we want to ingest
workshop:
  docs:
    path: classpath:docs/           # Drop .md / .txt / .pdf files here

server:
  port: 8082
